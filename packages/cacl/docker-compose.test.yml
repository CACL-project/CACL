# Docker Compose for running library tests locally.
# Usage: docker compose -f docker-compose.test.yml run --rm test
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cacl_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  test:
    image: python:3.12-slim
    depends_on:
      db:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/cacl_test
      JWT_SECRET_KEY: test_secret_key_for_testing
      CACL_USER_MODEL: tests.conftest.TestUser
    working_dir: /app
    volumes:
      - .:/app
    command: >
      sh -c "pip install -q -r requirements.txt && pip install -q -e . --no-deps && python -m pytest tests/ -v"
