name: Library Tests

on:
  push:
    branches: [main]
    paths:
      - 'packages/cacl/**'
      - '.github/workflows/library-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/cacl/**'
      - '.github/workflows/library-tests.yml'

defaults:
  run:
    working-directory: packages/cacl

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cacl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/cacl_test
      JWT_SECRET_KEY: test_secret_key_for_ci
      CACL_USER_MODEL: tests.conftest.TestUser

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/cacl/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . --no-deps

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Verify packaging
        run: |
          pip install build
          python -m build
          # Verify wheel contains only cacl/
          python -c "import zipfile; whl=list(__import__('pathlib').Path('dist').glob('*.whl'))[0]; files=[f for f in zipfile.ZipFile(whl).namelist() if not f.startswith('cacl')]; assert not files or all('dist-info' in f for f in files), f'Unexpected files in wheel: {files}'"
          # Verify sdist does not contain tests/
          python -c "import tarfile; sdist=list(__import__('pathlib').Path('dist').glob('*.tar.gz'))[0]; files=[f for f in tarfile.open(sdist).getnames() if '/tests/' in f or f.endswith('/tests')]; assert not files, f'Tests found in sdist: {files}'"
